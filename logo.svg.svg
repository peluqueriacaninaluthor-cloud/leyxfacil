<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A3B5C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A9B0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00A9B0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A3D9B1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fondo (opcional, quitar si se usa transparente) -->
  <rect width="800" height="200" fill="#F8FAFC" rx="16" />

  <!-- ====== ICONO: Libro + Engranaje + Cerebro ====== -->

  <!-- Libro (base) -->
  <g transform="translate(60, 50)">
    <!-- Páginas izquierdas -->
    <path d="M0,80 L0,20 Q20,10 40,20 L40,80 Q20,70 0,80 Z" fill="#1A3B5C" opacity="0.3"/>
    <path d="M5,78 L5,22 Q22,14 38,22 L38,78 Q22,70 5,78 Z" fill="#1A3B5C" opacity="0.5"/>
    <!-- Páginas derechas -->
    <path d="M40,80 L40,20 Q60,10 80,20 L80,80 Q60,70 40,80 Z" fill="#1A3B5C" opacity="0.3"/>
    <path d="M42,78 L42,22 Q58,14 75,22 L75,78 Q58,70 42,78 Z" fill="#1A3B5C" opacity="0.5"/>
    <!-- Lomo / centro -->
    <rect x="37" y="15" width="6" height="65" rx="2" fill="#1A3B5C"/>
    <!-- Tapa superior -->
    <path d="M-2,18 L82,18 L80,22 L0,22 Z" fill="#1A3B5C" opacity="0.2"/>
  </g>

  <!-- Engranaje (centro del libro) -->
  <g transform="translate(100, 60)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#00A9B0" stroke-width="3"/>
    <circle cx="0" cy="0" r="10" fill="#00A9B0" opacity="0.8"/>
    <rect x="-3" y="-24" width="6" height="10" rx="1" fill="#00A9B0"/>
    <rect x="-3" y="14" width="6" height="10" rx="1" fill="#00A9B0"/>
    <rect x="-24" y="-3" width="10" height="6" rx="1" fill="#00A9B0"/>
    <rect x="14" y="-3" width="10" height="6" rx="1" fill="#00A9B0"/>
    <rect x="-18" y="-18" width="6" height="6" rx="1" fill="#00A9B0" transform="rotate(45, -15, -15)"/>
    <rect x="12" y="-18" width="6" height="6" rx="1" fill="#00A9B0" transform="rotate(45, 15, -15)"/>
    <rect x="-18" y="12" width="6" height="6" rx="1" fill="#00A9B0" transform="rotate(45, -15, 15)"/>
    <rect x="12" y="12" width="6" height="6" rx="1" fill="#00A9B0" transform="rotate(45, 15, 15)"/>
  </g>

  <!-- Cerebro / Mapa mental (sobre el engranaje) -->
  <g transform="translate(100, 50)">
    <ellipse cx="0" cy="-4" rx="16" ry="18" fill="none" stroke="#A3D9B1" stroke-width="2.5"/>
    <ellipse cx="-6" cy="-6" rx="6" ry="8" fill="#A3D9B1" opacity="0.3"/>
    <ellipse cx="6" cy="-6" rx="6" ry="8" fill="#A3D9B1" opacity="0.3"/>
    <path d="M-3,-10 Q0,-14 3,-10" stroke="#A3D9B1" stroke-width="1.5" fill="none"/>
    <!-- Surcos del cerebro -->
    <path d="M-8,-2 Q-4,-8 0,-2 Q4,-8 8,-2" stroke="#A3D9B1" stroke-width="1.5" fill="none" opacity="0.6"/>
  </g>

  <!-- Puntos de conexión / red neuronal -->
  <g transform="translate(100, 50)">
    <circle cx="-25" cy="-15" r="2.5" fill="#00A9B0" opacity="0.6"/>
    <circle cx="-30" cy="5" r="2.5" fill="#00A9B0" opacity="0.6"/>
    <circle cx="25" cy="-15" r="2.5" fill="#00A9B0" opacity="0.6"/>
    <circle cx="30" cy="5" r="2.5" fill="#00A9B0" opacity="0.6"/>
    <circle cx="0" cy="22" r="2.5" fill="#00A9B0" opacity="0.6"/>
    <line x1="-25" y1="-15" x2="-10" y2="-10" stroke="#00A9B0" stroke-width="1" opacity="0.3"/>
    <line x1="25" y1="-15" x2="10" y2="-10" stroke="#00A9B0" stroke-width="1" opacity="0.3"/>
    <line x1="-30" y1="5" x2="-12" y2="2" stroke="#00A9B0" stroke-width="1" opacity="0.3"/>
    <line x1="30" y1="5" x2="12" y2="2" stroke="#00A9B0" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="22" x2="0" y2="12" stroke="#00A9B0" stroke-width="1" opacity="0.3"/>
    <line x1="-25" y1="-15" x2="-30" y2="5" stroke="#A3D9B1" stroke-width="1" opacity="0.2"/>
    <line x1="25" y1="-15" x2="30" y2="5" stroke="#A3D9B1" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- ====== TEXTO ====== -->
  <g transform="translate(170, 65)">
    <!-- LEY -->
    <text x="0" y="0" font-family="'Montserrat', 'Poppins', 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="url(#grad1)" letter-spacing="2">LEY</text>

    <!-- X -->
    <text x="120" y="0" font-family="'Montserrat', 'Poppins', 'Segoe UI', sans-serif" font-size="48" font-weight="300" fill="#00A9B0" letter-spacing="0">×</text>

    <!-- FÁCIL -->
    <text x="155" y="0" font-family="'Montserrat', 'Poppins', 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="url(#grad2)" letter-spacing="2">FÁCIL</text>

    <!-- Slogan -->
    <text x="0" y="35" font-family="'Inter', 'Segoe UI', sans-serif" font-size="15" font-weight="400" fill="#64748B" letter-spacing="4">HERRAMIENTAS IA PARA EL ESTUDIO JURÍDICO</text>
  </g>
</svg>